<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominó do Boteco</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de Espera -->
    <div id="lobby" class="screen">
        <h2>🪵 Dominó do Boteco 🎲</h2>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="Digite seu apelido">
            <button onclick="connectGame()">Entrar no Jogo</button>
        </div>
        <div id="lobby-info" class="hidden">
            <p>Mande o link/código para os amigos:</p>
            <div class="room-code-container">
                <span id="room-code">#CARREGANDO</span>
                <button onclick="copyCode()">Copiar Link</button>
            </div>
            <p id="player-count">Aguardando jogadores (0/4)...</p>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="game-screen" class="screen hidden">
        <div class="scoreboard">
            <div>Dupla A (P1 e P3): <span id="score-a">0</span></div>
            <div>Dupla B (P2 e P4): <span id="score-b">0</span></div>
        </div>

        <div class="game-table">
            <div id="board" class="domino-board">
                <p style="color: rgba(255,255,255,0.3);">Mesa de Jogo</p>
            </div>
        </div>

        <div class="player-hand-container">
            <h3>Sua Mão (Pedras Customizadas)</h3>
            <div id="player-hand" class="hand"></div>
        </div>
        <button onclick="solicitarTranque()" class="btn-trancar">Trancar Jogo</button>
    </div>

    <!-- Modal de Votação -->
    <div id="vote-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Quem começa a rodada? 🤔</h3>
            <p>Se der empate, a regra do 6-6 ganha automaticamente.</p>
            <button onclick="enviarVoto('6-6')">Quem tiver 6-6 (Sena)</button>
            <button onclick="enviarVoto('1-1')">Quem tiver 1-1 (Pio)</button>
            <div id="vote-status">Votos: 0/4</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
